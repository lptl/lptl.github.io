    <style>

      /* --- Main Container Styling (FOR POST) --- */

        margin: 3rem auto 0 auto;

        padding: 2rem clamp(1.5rem, 4vw, 2.5rem);

    <script>
      // --- Helper Functions ---
      function updateCommentCount(count) {
        const span = document.getElementById("comment-count");
        if (span) span.textContent = count;
      }
      function formatTimestamp(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diffSeconds = Math.round((now - date) / 1000);
        const diffMinutes = Math.round(diffSeconds / 60);
        const diffHours = Math.round(diffMinutes / 60);
        const diffDays = Math.round(diffHours / 24);
        if (diffSeconds < 60) return `${diffSeconds}s ago`;
        if (diffMinutes < 60) return `${diffMinutes}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays === 1) return `yesterday`;
        if (diffDays < 7) return `${diffDays}d ago`;
        return date.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
        });
      }
      function triggerMathJax(element) {
        if (
          typeof MathJax !== "undefined" &&
          MathJax.typesetPromise &&
          element
        ) {
          MathJax.typesetPromise([element]).catch((err) =>
            console.error("MathJax Err:", err)
          );
        }
      }

      // --- Main DOMContentLoaded Listener ---
      document.addEventListener("DOMContentLoaded", function () {
        console.log("DOM loaded.");

        // --- Function to set accent color from background ---
        function setAccentColorFromBackground() {
          console.log("Attempting to set accent color...");
          const bodyStyles = window.getComputedStyle(document.body);
          const bgImageStyle = bodyStyles.backgroundImage;

          // Extract URL from 'url("...")' string
          const urlMatch = bgImageStyle.match(/url\("?([^"]+)"?\)/);
          if (!urlMatch || !urlMatch[1]) {
            console.warn("Could not extract background image URL from CSS.");
            return; // Use fallback color
          }
          const imageUrl = urlMatch[1];
          console.log("Background image URL:", imageUrl);

          const img = new Image();
          // IMPORTANT: Set crossOrigin *before* src for potential CORS requests
          img.crossOrigin = "Anonymous";

          img.onload = function () {
            console.log("Background image loaded successfully.");
            const canvas = document.createElement("canvas");
            // Smaller canvas for performance - adjust as needed
            const W = 50;
            const H = 50;
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext("2d", { willReadFrequently: true }); // Hint for optimization

            // Draw potentially scaled image
            ctx.drawImage(img, 0, 0, W, H);

            let data;
            try {
              data = ctx.getImageData(0, 0, W, H).data;
            } catch (e) {
              console.error("Error getting image data (likely CORS issue):", e);
              console.warn(
                "Falling back to default accent color due to error."
              );
              // No need to set variable here, it defaults to fallback
              return;
            }

            let r = 0,
              g = 0,
              b = 0;
            let pixelCount = 0;
            // Sample pixels (e.g., every 5th pixel) for performance
            const sampleRate = 5;
            for (let i = 0; i < data.length; i += 4 * sampleRate) {
              // Optional: Add check for alpha > threshold if needed
              // if (data[i + 3] > 128) { // Only sample opaque pixels
              r += data[i];
              g += data[i + 1];
              b += data[i + 2];
              pixelCount++;
              // }
            }

            if (pixelCount === 0) {
              console.warn(
                "No pixels sampled (image might be transparent or empty). Falling back."
              );
              return;
            }

            const avgR = Math.round(r / pixelCount);
            const avgG = Math.round(g / pixelCount);
            const avgB = Math.round(b / pixelCount);

            const avgColor = `rgb(${avgR}, ${avgG}, ${avgB})`;
            console.log("Calculated Average Color:", avgColor);

            // Set the CSS variable
            document.documentElement.style.setProperty(
              "--primary-accent",
              avgColor
            );
            console.log("--primary-accent set to calculated color.");

            // Optional: Calculate and set a hover color (e.g., slightly darker)
            // This is a basic darkening effect, might need tweaking
            const darkerR = Math.max(0, avgR - 30);
            const darkerG = Math.max(0, avgG - 30);
            const darkerB = Math.max(0, avgB - 30);
            const hoverColor = `rgb(${darkerR}, ${darkerG}, ${darkerB})`;
            document.documentElement.style.setProperty(
              "--link-hover-color",
              hoverColor
            );
          };

          img.onerror = function () {
            console.error("Error loading background image. Check path/URL.");
            console.warn("Falling back to default accent color.");
            // No need to set variable here, it defaults to fallback
          };

          img.src = imageUrl; // Start loading the image
        }

        // Run the color extraction function
        setAccentColorFromBackground();

        // --- Markdown Rendering ---
        const markdownSourceElement =
          document.getElementById("markdown-source");
        const renderAreaElement = document.getElementById(
          "markdown-render-area"
        );
        // ... other console logs ...

        if (
          markdownSourceElement &&
          renderAreaElement &&
          typeof marked !== "undefined"
        ) {
          console.log("Setup OK: Elements found and marked library loaded.");
          try {
            // Configure marked
            marked.setOptions({
              breaks: false, // <<< SET TO FALSE
              gfm: true, // Keep gfm: true for other features like tables, etc.
            });
            const markdownText = markdownSourceElement.value;
            console.log(`Markdown Text read (length: ${markdownText.length})`);

            if (!markdownText) {
              console.warn("Markdown source textarea is empty!");
            }

            const htmlContent = marked.parse(markdownText); // Parse Markdown
            console.log("Markdown parsed successfully.");

            renderAreaElement.innerHTML = htmlContent; // Render HTML
            console.log("SUCCESS: renderAreaElement.innerHTML updated.");

            console.log("Queueing MathJax for main content...");
            setTimeout(() => triggerMathJax(renderAreaElement), 100);
          } catch (error) {
            console.error("ERROR during Markdown parsing or rendering:", error);
            if (renderAreaElement)
              renderAreaElement.innerHTML = `<p style="color: red; font-weight: bold;">Error rendering content: ${error.message}</p>`;
          }
        } else {
          console.error(
            "Markdown Rendering Setup FAILED. Reasons logged above."
          );
          if (renderAreaElement)
            renderAreaElement.innerHTML =
              "<p>Error loading content - initial setup failed.</p>";
        }

        // --- Comments Functionality ---
        const commentsList = document.getElementById("comments-list");
        const commentForm = document.getElementById("comment-form");
        /* ... other comment variables ... */
        const storageKey = `comments_${window.location.pathname}`;

        function loadComments() {
          /* ... implementation ... */
        }
        function renderComment(comment) {
          /* ... implementation ... */
        }
        if (commentForm) {
          commentForm.addEventListener("submit", function (event) {
            /* ... implementation ... */
          });
        } else {
          console.error("Comment form not found!");
        }

        loadComments(); // Initial load
        // --- End Comments Functionality ---
      }); // End DOMContentLoaded Listener

      // --- Full Comment Function Implementations (ensure they are defined) ---
      function loadComments() {
        const commentsList = document.getElementById("comments-list");
        const storageKey = `comments_${window.location.pathname}`;
        if (!commentsList) {
          console.error("Comments list element not found during load.");
          return;
        }
        const storedComments = localStorage.getItem(storageKey);
        const comments = storedComments ? JSON.parse(storedComments) : [];
        commentsList.innerHTML = "";
        comments.forEach((comment) => renderComment(comment)); // Needs renderComment
        updateCommentCount(comments.length); // Needs updateCommentCount
      }

      function renderComment(comment) {
        const commentsList = document.getElementById("comments-list");
        if (!commentsList) return;

        const commentDiv = document.createElement("div");
        commentDiv.className = "comment";
        const metaDiv = document.createElement("div");
        metaDiv.className = "comment-meta";
        const authorSpan = document.createElement("span");
        authorSpan.className = "author";
        authorSpan.textContent =
          comment.author && comment.author.trim() !== ""
            ? comment.author
            : "Anonymous";
        const timestampSpan = document.createElement("span");
        timestampSpan.className = "timestamp";
        timestampSpan.textContent = formatTimestamp(comment.timestamp); // Needs formatTimestamp
        metaDiv.appendChild(authorSpan);
        metaDiv.appendChild(timestampSpan);

        const textDiv = document.createElement("div");
        textDiv.className = "comment-text";
        if (typeof marked !== "undefined") {
          const potentiallyUnsafe = /<script[\s\S]*?>[\s\S]*?<\/script>/gi;
          let cleanedText = (comment.text || "").replace(potentiallyUnsafe, "");
          textDiv.innerHTML = marked.parse(cleanedText);
        } else {
          textDiv.textContent = comment.text || "";
        }

        commentDiv.appendChild(metaDiv);
        commentDiv.appendChild(textDiv);
        commentsList.appendChild(commentDiv);

        if (
          comment.text &&
          comment.text.match(/(\$|\\\(|\\\[).+(\$|\\\)|\\\])/)
        ) {
          setTimeout(() => triggerMathJax(textDiv), 150); // Needs triggerMathJax
        }
      }

      // Submit handler needs to be inside the DOMContentLoaded or called from there
      // The event listener addition itself *is* inside DOMContentLoaded, which is correct.
    </script>
  </body>
